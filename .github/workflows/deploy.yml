name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/log-api:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Pull da imagem mais recente
            docker pull ghcr.io/${{ env.OWNER_LC }}/log-api:latest
            
            # Navega até o diretório do projeto ou roda via docker run
            # O ideal é usar o docker-compose.yml que já configuramos
            # Vamos subir usando o docker run direto para simplificar o primeiro deploy
            
            docker stop log-api || true
            docker rm log-api || true
            
            docker run -d \
              --name log-api \
              --restart always \
              -v /var/run/docker.sock:/var/run/docker.sock \
              ghcr.io/${{ env.OWNER_LC }}/log-api:latest
